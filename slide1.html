<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide thuyết minh - Quản trị doanh nghiệp Nhật Bản</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #1e2b3c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .slide-container {
            width: 1280px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -10px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .slide-header {
            background: #0b1a2a;
            color: #f0f4fa;
            padding: 12px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b5a78;
            flex-shrink: 0;
        }
        .slide-header h2 {
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }
        .slide-header .slide-counter {
            background: #2a4055;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .slide-body {
            flex: 1;
            padding: 24px 36px 20px 36px;
            overflow-y: auto;
            background: #fafcff;
            display: flex;
            flex-direction: column;
        }
        .slide-body h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #0b1a2a;
            border-left: 6px solid #2d7aff;
            padding-left: 20px;
            margin-bottom: 18px;
        }
        .slide-body h2 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e3b5a;
            margin: 12px 0 10px 0;
        }
        .slide-body h3 {
            font-size: 1.2rem;
            font-weight: 500;
            color: #1f4970;
            margin: 8px 0;
        }
        .slide-body p, .slide-body li {
            color: #1f2e3f;
            line-height: 1.6;
            font-size: 1rem;
        }
        .slide-body ul {
            padding-left: 24px;
            margin: 6px 0;
        }
        .slide-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin: 12px 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .slide-body th {
            background: #e4ecf5;
            color: #0b1f32;
            font-weight: 600;
            padding: 8px 6px;
            border: 1px solid #ccdae8;
            text-align: center;
        }
        .slide-body td {
            padding: 6px 8px;
            border: 1px solid #dde6f0;
            text-align: center;
        }
        .highlight-box {
            background: #eef4fb;
            padding: 14px 20px;
            border-radius: 16px;
            border-left: 6px solid #2d7aff;
            margin: 10px 0;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: space-between;
        }
        .flex-col {
            flex: 1;
            min-width: 200px;
        }
        .audio-control {
            margin-top: 18px;
            background: #f0f6fe;
            padding: 12px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #bdd6ed;
            flex-wrap: wrap;
        }
        .audio-control label {
            font-weight: 600;
            color: #0b2a4a;
        }
        .audio-control input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #b0c8df;
            font-size: 0.9rem;
            background: white;
            min-width: 180px;
        }
        .audio-control button {
            background: #1f4b77;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .audio-control button:hover {
            background: #0f3457;
        }
        .play-btn {
            background: #2d7aff;
            border: none;
            color: white;
            font-size: 1.4rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .play-btn:hover {
            background: #1a5fd0;
            transform: scale(1.05);
        }
        .play-btn.playing {
            background: #e65c4b;
        }
        .slide-footer {
            background: #eef3f9;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #c7d7e9;
            flex-shrink: 0;
        }
        .nav-btn {
            background: #1f4970;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
            padding: 8px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .nav-btn:hover {
            background: #0d2b47;
            transform: scale(0.97);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .slide-footer span {
            color: #1f3b57;
            font-weight: 500;
        }
        .slide-body::-webkit-scrollbar {
            width: 5px;
        }
        .slide-body::-webkit-scrollbar-track {
            background: #eef3f9;
        }
        .slide-body::-webkit-scrollbar-thumb {
            background: #7c9bc0;
            border-radius: 10px;
        }
        @media (max-width: 800px) {
            .slide-body { padding: 16px; }
            .slide-header h2 { font-size: 1rem; }
            .audio-control { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="slide-container" id="app">

        <div class="slide-counter">Slide <span id="currentSlideIndex">1</span> / <span id="totalSlides">21</span></div>
    </div>

    <div class="slide-body" id="slideBody"></div>

    <div class="slide-footer">
        <button class="nav-btn" id="prevBtn" disabled>◀ Trang trước</button>
        <span id="slideTitle">Tổng quan</span>
        <button class="nav-btn" id="nextBtn">Trang sau ▶</button>
    </div>
</div>

        { title: 'Toyota 2016', content: `<h1>🚗 Toyota 2016</h1><table><tr><th>股东分类</th><th>持股(%)</th></tr><tr><td>交叉持股/稳定股东</td><td>11.70</td></tr><tr><td>主银行</td><td>1.50</td></tr><tr><td>机构投资者(国内) 信托</td><td>10.10</td></tr><tr><td>其他国内机构</td><td>9.00</td></tr><tr><td>外国机构投资者</td><td>19.00</td></tr><tr><td>中小散户</td><td>9.00</td></tr><tr><td>库存股/其他</td><td>30.10</td></tr></table><p style="margin-top:8px;"><strong>📈 外国投資家維持, 国内機関投資家減少</strong></p>` },

        { title: 'Sony 2011', content: `<h1>🎮 Sony 2011</h1><table><tr><th>股东分类</th><th>持股(%)</th></tr><tr><td>交叉持股 (三菱UFJ・三井住友・瑞穗)</td><td>8.10</td></tr><tr><td>主银行 日本生命</td><td>2.50</td></tr><tr><td>国内机构</td><td>10.00</td></tr><tr><td>外国机构投资者</td><td>28.00</td></tr><tr><td>中小散户</td><td>8.00</td></tr><tr><td>库存股/其他</td><td>24.60</td></tr></table><p>📌 <strong>外国機関投資家 28% – 既に高い</strong></p>` },
        { title: 'Sony 2016', content: `<h1>🎮 Sony 2016</h1><table><tr><th>股东分类</th><th>持股(%)</th></tr><tr><td>交叉持股 (三菱UFJ・三井住友・瑞穗)</td><td>7.00</td></tr><tr><td>国内信托 (Master Trust・Japan Trustee)</td><td>9.24</td></tr><tr><td>外国機関 (Citibank, JPM, State Street)</td><td>16.53</td></tr><tr><td>其他外国机构</td><td>15.00</td></tr><tr><td>中小散户</td><td>6.00</td></tr><tr><td>库存股/其他</td><td>28.23</td></tr></table><p>🌟 <strong>外国投資家合計 31%+ , 支配力増大</strong></p>` },
        { title: 'SoftBank 2011', content: `<h1>📱 SoftBank 2011</h1><table><tr><th>股东分类</th><th>持股(%)</th></tr><tr><td>孫正義 (创始人家族)</td><td>19.30</td></tr><tr><td>国内信托</td><td>5.50</td></tr><tr><td>交叉持股 (雅虎日本)</td><td>3.50</td></tr><tr><td>主银行 瑞穗</td><td>2.50</td></tr><tr><td>其他国内机构</td><td>8.00</td></tr><tr><td>外国机构投资者</td><td>22.00</td></tr><tr><td>中小散户</td><td>8.00</td></tr><tr><td>库存股/其他</td><td>16.50</td></tr></table>` },
        { title: 'SoftBank 2016', content: `<h1>📱 SoftBank 2016</h1><table><tr><th>股东分类</th><th>持股(%)</th></tr><tr><td>孫正義 (创始人)</td><td>19.80</td></tr><tr><td>国内信托 (Master Trust・Custody)</td><td>23.70</td></tr><tr><td>主银行 瑞穗</td><td>1.80</td></tr><tr><td>其他国内机构</td><td>3.00</td></tr><tr><td>外国机构投资者</td><td>25.00</td></tr><tr><td>中小散户</td><td>5.00</td></tr><tr><td>库存股/其他</td><td>10.20</td></tr></table><p>📊 <strong>外国投資家 25% , 信託銀行急増</strong></p>` },
        { title: 'Các bên liên quan', content: `<h1>🧩 Các bên liên quan</h1><div class="highlight-box"><p><strong>🏛️ 交叉持股・主銀行</strong> : 安定・長期, 既得権益</p><p><strong>🌍 海外投資家・中小散户</strong> : 高配当・株価上昇, 発言権希薄</p><p><strong>👑 創業家</strong> : 保守的, 継承重視</p></div><h3>→ 改革でパワーバランスが変化</h3>` },
        { title: '1.2 董事会', content: `<h1>📋 董事会</h1><p><strong>監督・重大決策</strong> (内部董事 + 独立董事)</p><div class="highlight-box"><p><strong>旧模式:</strong> 社長・経営陣が指名, 90%以上内部昇進, 外部は親族・関連会社 → 「ゴム印」</p><p><strong>改革後:</strong> 指名委員会 (独立董事必須) に移行</p></div>` },
        { title: 'Toyota 董事会 2011', content: `<h1>🚘 Toyota 2011</h1><p><strong>15名中 内部14名, 外部1名 (三菱重工前社長)</strong></p><p style="background:#eef4fb; padding:8px; border-radius:8px;">👤 豊田章一郎 (名誉会長)・張富士夫・豊田章男 など</p><p>🔹 外部比率 約7%</p>` },
        { title: 'Toyota 董事会 2016', content: `<h1>🚘 Toyota 2016</h1><p><strong>15名中 外部5名 (33%)</strong> ～ 最低限コンプライアンス</p><p>➕ 独立董事 約3名 (真の独立性は限定的)</p><p style="background:#eef4fb; padding:8px; border-radius:8px;">📌 外部董事増加, 但仍為最低要求</p>` },
        { title: 'Mitsubishi Corp 董事会', content: `<h1>🏢 三菱商事 董事会</h1><p><strong>2011:</strong> 外部 0% (全員内部)</p><p><strong>2016:</strong> 14名中 外部5名 (36%) – 但し関連会社出身の「包装」</p><p>🔸 実質独立性は低い</p>` },
        { title: 'Sony 董事会', content: `<h1>🎯 Sony 董事会 – 異例の改革</h1><p><strong>2011:</strong> 13名中 外部4名 (31%)</p><p><strong>2016:</strong> 12名中 外部8名 (67%) – 多数派, 会長も外部</p><p>🌟 <strong>真の独立監督者</strong> (元米国大使, MIT, 監査役など)</p><p>✅ 指名・報酬・監査委員会を外部主導</p>` },
        { title: 'SoftBank 董事会', content: `<h1>📱 SoftBank 董事会</h1><p><strong>2011:</strong> 外部 0% (全員内部昇進・子会社)</p><p><strong>2016:</strong> 11名中 外部3名 (27%) – ただし马云・柳井正は独立性が疑問</p><p>⚠️ <strong>独立性が最も薄弱</strong> (子会社CEOを外部とラベリング)</p>` },
        { title: 'Mức độ độc lập', content: `<h1>📊 外部董事の実態</h1><ul><li><strong>1. 真の独立監督者</strong> (Sony) – 無関係, 委員会議長</li><li><strong>2. 限定的独立性</strong> (Toyota) – メインバンク出身など</li><li><strong>3. 関連会社の包装</strong> (三菱商事) – 取引先の前役員</li><li><strong>4. 内部人間を外部と偽装</strong> (SoftBank) – 子会社CEO</li></ul><div class="highlight-box">🔹 Sony のみが真の改革, 他は形式適合</div>` },
        { title: '1.3 経営陣', content: `<h1>👔 経営陣 (社長・執行)</h1><p><strong>CEO 選任</strong> : 旧→社長推薦, 年功序列, 新→指名委員会</p><p><strong>報酬</strong> : 旧→固定, 年功, 新→ROE連動, 独立委員会</p><p>📌 変化は遅いが、外圧で進む</p>` },
        { title: '外部董事比率 変化', content: `<h1>📈 外部董事比率 (2011→2016)</h1><table><tr><th>会社</th><th>2011</th><th>2016</th><th>実質独立</th></tr><tr><td>Sony</td><td>31%</td><td>67%</td><td>6/8</td></tr><tr><td>Toyota</td><td>7%</td><td>33%</td><td>3/5</td></tr><tr><td>三菱商事</td><td>0%</td><td>36%</td><td>2/5</td></tr><tr><td>SoftBank</td><td>0%</td><td>27%</td><td>1/3</td></tr></table><p>⭐ Sony が唯一の「過半数外部」, 他は最低限</p>` },
        { title: 'Kết luận', content: `<h1>🏁 改革の最大得益者: 外国投資家</h1><div class="highlight-box"><p>📌 信託銀行・外国投資家の持分増加 → 発言力上昇</p><p>📌 コーポレートガバナンス改革で配当・ROE重視へ</p><p>📌 外部董事は「本物」かどうかが分かれ目</p></div><p style="margin-top:16px;"><strong>➡️  Sony は先行事例, 他社は追随または形式的対応</strong></p>` }
    ];

    // ----- STATE -----
    let currentIndex = 0;
    const total = slides.length;
    // Lưu link vocaroo cho từng slide
    const vocarooLinks = new Array(total).fill('https://voca.ro/12LtZ9RPPfVD');

    // elements
    const slideBody = document.getElementById('slideBody');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const slideTitle = document.getElementById('slideTitle');
    const currentSlideSpan = document.getElementById('currentSlideIndex');
    const totalSlidesSpan = document.getElementById('totalSlides');
    totalSlidesSpan.textContent = total;

    // Biến để quản lý audio
    let currentAudio = null;

    function renderSlide(index) {
        const slide = slides[index];
        if (!slide) return;
        slideBody.innerHTML = slide.content;
        slideTitle.textContent = slide.title || `Slide ${index+1}`;
        currentSlideSpan.textContent = index + 1;
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === total - 1;

        // Thêm phần điều khiển âm thanh
        const audioDiv = document.createElement('div');
        audioDiv.className = 'audio-control';
        const link = vocarooLinks[index] || '';
        audioDiv.innerHTML = `
            <label>🎙️ Vocaroo:</label>
            <input type="text" id="vocarooInput_${index}" placeholder="Dán link Vocaroo..." value="${link}">
            <button onclick="saveVocaroo(${index})">Lưu</button>
            <button class="play-btn" id="playBtn_${index}" onclick="togglePlay(${index})">▶</button>
        `;
        slideBody.appendChild(audioDiv);
    }

    // Lưu link vocaroo
    window.saveVocaroo = function(idx) {
        const input = document.getElementById(`vocarooInput_${idx}`);
        if (input) {
            vocarooLinks[idx] = input.value.trim();
            alert('✅ Đã lưu link thuyết minh cho slide ' + (idx+1));
        }
    };

    // Phát/dừng âm thanh
    window.togglePlay = function(idx) {
        const btn = document.getElementById(`playBtn_${idx}`);
        const link = vocarooLinks[idx];
        if (!link) {
            alert('⚠️ Vui lòng nhập link Vocaroo trước.');
            return;
        }

        // Nếu đang có audio và là cùng slide thì tắt
        if (currentAudio && currentAudio.slideIndex === idx && !currentAudio.audio.paused) {
            currentAudio.audio.pause();
            btn.textContent = '▶';
            btn.classList.remove('playing');
            return;
        }

        // Dừng audio cũ
        if (currentAudio) {
            currentAudio.audio.pause();
            const oldBtn = document.getElementById(`playBtn_${currentAudio.slideIndex}`);
            if (oldBtn) { oldBtn.textContent = '▶'; oldBtn.classList.remove('playing'); }
        }

        // Tạo audio mới
        const audio = new Audio(link);
        audio.play().catch(e => {
            alert('❌ Không thể phát âm thanh. Kiểm tra link Vocaroo.');
            console.warn(e);
        });
        currentAudio = { slideIndex: idx, audio: audio };
        btn.textContent = '⏹';
        btn.classList.add('playing');

        // Khi kết thúc, reset nút
        audio.onended = function() {
            btn.textContent = '▶';
            btn.classList.remove('playing');
            if (currentAudio && currentAudio.slideIndex === idx) {
                currentAudio = null;
            }
        };
    };

    function goTo(index) {
        if (index < 0) index = 0;
        if (index >= total) index = total - 1;
        currentIndex = index;
        // Dừng audio đang phát khi chuyển slide
        if (currentAudio) {
            currentAudio.audio.pause();
            const oldBtn = document.getElementById(`playBtn_${currentAudio.slideIndex}`);
            if (oldBtn) { oldBtn.textContent = '▶'; oldBtn.classList.remove('playing'); }
            currentAudio = null;
        }
        renderSlide(currentIndex);
    }

    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));

    // init
    renderSlide(0);
</script>
</body>
</html>
